versions:
  - version: "0.8.2"
    date: 2026-03-18T13:47:13Z
    main_changes:
      - label: Filter groups
        description: Save library filter configurations to categories library items.
        commit: 43600e802ee575784b3a2dd4448e7af2271966d1
      - label: Saved source searches
        description: Save and load search text and filter configurations in sources.
        commit: 72fad9fa00345ee2a7a7df05707c57df26099cfb
      - label: MangaBaka tracker
        description: Log in and track items with mangabaka.org.
        commit: 55e4f59c3cc8b4284af5b0a10d4dd28a04f9f8c0
      - label: Improved text reader (experimental)
        description: Now with a paged reading style and font configuration for text-only chapters.
        commit: ad3595f5476a28ac5632ba551c73378c2f22d7a1
        contributor: rbertus2000
    other_features:
      - label: Hide bars on swipe setting
        description: Automatically dismiss bars in the reader after swiping to the next page.
        commit: 38d0d215bfc0ebe9d548a4657b1472fc1d5078f9
      - label: Category filter for library
        commit: 69853bb53e531743bcf2946e6d34a3e9dd9caf91
      - label: Uncategorized library category option
        description: Easily find series in your library that haven't been added to a category.
        commit: 1f8ac072716b642f3c5e98eedf33d010d649a0ca
      - label: Komga and Kavita mirrors setting
        description: Configure multiple base URLs your server can be accessed from.
        commit: 42828e1961cb8233ad991681e91541fa24fe4504
      - label: Scanlator affinity
        description: Prefers next chapters from the scanlator you're already reading.
        commit: 2b40bff32322a7cbad380888f809d2ff9f5db1a4
        contributor: kunihir0
      - label: Missing source list indicator
        description: Displays a warning if a source was removed from a source list and will no longer receive updates.
        commit: 79056db24afdcaf0b946166380a75b5b3501ac06
      - label: Import backups from files in-app
        commit: d147d96d4ea66c693acb8083f23e7b067bc09a7d
      - label: Prompt history sync when newer chapters are detected on tracker
        commit: c7fbe45408d84a555baccb4a23e8e313b0cc54e0
      - label: Source tag/genre filter searching
        commit: f3cda93eb053f8ed26b42c22d6e0e2445f088599
